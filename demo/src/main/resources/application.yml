spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/bento_db?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
  sql:
    init:
      mode: always
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

app:
  menu-image:
    upload-dir: uploads/menus
    public-root: uploads
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5174}
  jwt:
    secret: ${APP_JWT_SECRET:sunseer-bento-reservation-system-jwt-secret-key-2026}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  mail:
    enabled: ${APP_MAIL_ENABLED:true}
    reminder-cron: ${APP_MAIL_REMINDER_CRON:0 0 9 * * MON-FRI}
